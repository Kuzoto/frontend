name: Frontend CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & Test (Vite / React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Notify Mattermost
        if: always()
        env:
          WEBHOOK: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title }}
        run: |
          EMOJI=$( [ "$STATUS" = "success" ] && echo "✅" || echo "❌" )
          BRANCH=$( [ "${{ github.event_name }}" = "pull_request" ] \
            && echo "${{ github.head_ref }}" || echo "${{ github.ref_name }}" )
          SHORT_MSG=$(echo "$COMMIT_MSG" | head -c 80)
          TEXT="${EMOJI} **Frontend CI** | ${STATUS} | branch: \`${BRANCH}\` | ${ACTOR}: ${SHORT_MSG}"
          curl -s -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            --data-binary "$(jq -n --arg t "$TEXT" '{text: $t}')"
